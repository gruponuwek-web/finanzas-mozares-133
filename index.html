<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💚 Finanzas Mozares</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div id="portada" class="portada">
    <div class="portada-container">
        <h1 class="portada-titulo">💚 Finanzas Mozares</h1>
        <div class="portada-card">
            <div class="reloj" id="reloj">00:00:00</div>
            <div class="fecha" id="fecha">Lunes, 1 de enero</div>
            <p class="frase" id="frase">Cargando...</p>
            <p class="pregunta">¿Quién eres?</p>
            <div class="botones-usuario">
                <button class="btn-usuario btn-el" onclick="app.iniciarSesion('el')">💙 Él</button>
                <button class="btn-usuario btn-ella" onclick="app.iniciarSesion('ella')">🧡 Ella</button>
            </div>
        </div>
    </div>
</div>

<div id="navbar" class="navbar hidden">
    <div class="navbar-content">
        <h1 class="navbar-titulo">💚 FM</h1>
        <div class="navbar-menu">
            <button class="navbar-btn active" onclick="app.mostrarSeccion('dashboard')">Dashboard</button>
            <button class="navbar-btn" onclick="app.mostrarSeccion('presupuesto')">Presupuesto</button>
            <button class="navbar-btn" onclick="app.mostrarSeccion('cuentas')">Cuentas</button>
            <button class="navbar-btn" onclick="app.mostrarSeccion('transacciones')">Transacciones</button>
            <button class="navbar-btn" onclick="app.mostrarSeccion('configuracion')">⚙️ Config</button>
            <button class="navbar-btn btn-salir" onclick="app.cerrarSesion()">Salir</button>
        </div>
    </div>
</div>

<div id="dashboard" class="content hidden"><h2 class="section-titulo">📊 Dashboard - <span id="usuario-nombre">Él</span></h2><div id="dashboard-container"></div></div>
<div id="presupuesto" class="content hidden"><h2 class="section-titulo">💰 Presupuesto</h2><div id="presupuesto-container"></div></div>
<div id="cuentas" class="content hidden"><h2 class="section-titulo">💳 Cuentas</h2><div id="cuentas-container"></div></div>
<div id="transacciones" class="content hidden"><h2 class="section-titulo">📝 Transacciones</h2><div id="transacciones-container"></div></div>
<div id="configuracion" class="content hidden"><h2 class="section-titulo">⚙️ Configuración</h2><div id="configuracion-container"></div></div>

<!-- MODAL TRANSACCIONES -->
<div id="modal-transacciones" class="modal-overlay hidden">
    <div class="modal-container">
        <div class="modal-header">
            <h2>➕ Nueva Transacción</h2>
            <button class="modal-close" onclick="modalTransacciones.cerrarModal()">✕</button>
        </div>
        
        <div class="modal-tabs">
            <button class="modal-tab-btn active" onclick="modalTransacciones.cambiarPestana('ingreso')">💰 Ingreso</button>
            <button class="modal-tab-btn" onclick="modalTransacciones.cambiarPestana('egreso')">📉 Egreso</button>
            <button class="modal-tab-btn" onclick="modalTransacciones.cambiarPestana('transaccion')">↔️ Transacción</button>
        </div>
        
        <!-- TAB INGRESO -->
        <div id="tab-ingreso" class="modal-tab">
            <div class="form-grupo">
                <label class="form-label">Categoría</label>
                <select class="form-select" id="cat-ingreso"></select>
            </div>
            <div class="form-grupo">
                <label class="form-label">Descripción</label>
                <input type="text" class="form-input" id="desc-ingreso" placeholder="Ej: Pago de trabajo">
            </div>
            <div class="form-grupo">
                <label class="form-label">Cuenta a Depositar</label>
                <select class="form-select" id="cuenta-ingreso"></select>
            </div>
            <div class="form-grupo">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-input" id="fecha-ingreso">
            </div>
            <div class="calculadora-box">
                <input type="text" class="calc-display" id="calc-display-ingreso" readonly>
                <div class="calc-grid">
                    <button onclick="modalTransacciones.agregarNumero('7')">7</button>
                    <button onclick="modalTransacciones.agregarNumero('8')">8</button>
                    <button onclick="modalTransacciones.agregarNumero('9')">9</button>
                    <button onclick="modalTransacciones.setOperacion('+')" class="calc-op">+</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('4')">4</button>
                    <button onclick="modalTransacciones.agregarNumero('5')">5</button>
                    <button onclick="modalTransacciones.agregarNumero('6')">6</button>
                    <button onclick="modalTransacciones.setOperacion('-')" class="calc-op">−</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('1')">1</button>
                    <button onclick="modalTransacciones.agregarNumero('2')">2</button>
                    <button onclick="modalTransacciones.agregarNumero('3')">3</button>
                    <button onclick="modalTransacciones.setOperacion('×')" class="calc-op">×</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('0')" class="calc-zero">0</button>
                    <button onclick="modalTransacciones.agregarNumero('.')">,</button>
                    <button onclick="modalTransacciones.setOperacion('÷')" class="calc-op">÷</button>
                </div>
                <div class="calc-botones-inferiores">
                    <button onclick="modalTransacciones.calcular()" class="calc-igual">=</button>
                    <button onclick="modalTransacciones.limpiarCalculadora()" class="calc-clear">C</button>
                </div>
            </div>
            <button class="btn-primary" onclick="modalTransacciones.guardarIngreso()">Registrar Ingreso</button>
        </div>
        
        <!-- TAB EGRESO -->
        <div id="tab-egreso" class="modal-tab hidden">
            <div class="form-grupo">
                <label class="form-label">Tipo</label>
                <select class="form-select" id="tipo-egreso">
                    <option value="Gasto">Gasto</option>
                    <option value="Obligatoria">Obligatoria</option>
                </select>
            </div>
            <div class="form-grupo">
                <label class="form-label">Categoría</label>
                <select class="form-select" id="cat-egreso"></select>
            </div>
            <div class="form-grupo">
                <label class="form-label">Descripción</label>
                <input type="text" class="form-input" id="desc-egreso" placeholder="Ej: Farmacia">
            </div>
            <div class="form-grupo">
                <label class="form-label">Cuenta a Descontar</label>
                <select class="form-select" id="cuenta-egreso"></select>
            </div>
            <div class="form-grupo">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-input" id="fecha-egreso">
            </div>
            <div class="calculadora-box">
                <input type="text" class="calc-display" id="calc-display-egreso" readonly>
                <div class="calc-grid">
                    <button onclick="modalTransacciones.agregarNumero('7')">7</button>
                    <button onclick="modalTransacciones.agregarNumero('8')">8</button>
                    <button onclick="modalTransacciones.agregarNumero('9')">9</button>
                    <button onclick="modalTransacciones.setOperacion('+')" class="calc-op">+</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('4')">4</button>
                    <button onclick="modalTransacciones.agregarNumero('5')">5</button>
                    <button onclick="modalTransacciones.agregarNumero('6')">6</button>
                    <button onclick="modalTransacciones.setOperacion('-')" class="calc-op">−</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('1')">1</button>
                    <button onclick="modalTransacciones.agregarNumero('2')">2</button>
                    <button onclick="modalTransacciones.agregarNumero('3')">3</button>
                    <button onclick="modalTransacciones.setOperacion('×')" class="calc-op">×</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('0')" class="calc-zero">0</button>
                    <button onclick="modalTransacciones.agregarNumero('.')">,</button>
                    <button onclick="modalTransacciones.setOperacion('÷')" class="calc-op">÷</button>
                </div>
                <div class="calc-botones-inferiores">
                    <button onclick="modalTransacciones.calcular()" class="calc-igual">=</button>
                    <button onclick="modalTransacciones.limpiarCalculadora()" class="calc-clear">C</button>
                </div>
            </div>
            <button class="btn-primary" onclick="modalTransacciones.guardarEgreso()">Registrar Egreso</button>
        </div>
        
        <!-- TAB TRANSACCION -->
        <div id="tab-transaccion" class="modal-tab hidden">
            <div class="form-grupo">
                <label class="form-label">De Cuenta</label>
                <select class="form-select" id="de-cuenta"></select>
            </div>
            <div class="form-grupo">
                <label class="form-label">A Cuenta</label>
                <select class="form-select" id="a-cuenta"></select>
            </div>
            <div class="form-grupo">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-input" id="fecha-transaccion">
            </div>
            <div class="calculadora-box">
                <input type="text" class="calc-display" id="calc-display-transaccion" readonly>
                <div class="calc-grid">
                    <button onclick="modalTransacciones.agregarNumero('7')">7</button>
                    <button onclick="modalTransacciones.agregarNumero('8')">8</button>
                    <button onclick="modalTransacciones.agregarNumero('9')">9</button>
                    <button onclick="modalTransacciones.setOperacion('+')" class="calc-op">+</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('4')">4</button>
                    <button onclick="modalTransacciones.agregarNumero('5')">5</button>
                    <button onclick="modalTransacciones.agregarNumero('6')">6</button>
                    <button onclick="modalTransacciones.setOperacion('-')" class="calc-op">−</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('1')">1</button>
                    <button onclick="modalTransacciones.agregarNumero('2')">2</button>
                    <button onclick="modalTransacciones.agregarNumero('3')">3</button>
                    <button onclick="modalTransacciones.setOperacion('×')" class="calc-op">×</button>
                    
                    <button onclick="modalTransacciones.agregarNumero('0')" class="calc-zero">0</button>
                    <button onclick="modalTransacciones.agregarNumero('.')">,</button>
                    <button onclick="modalTransacciones.setOperacion('÷')" class="calc-op">÷</button>
                </div>
                <div class="calc-botones-inferiores">
                    <button onclick="modalTransacciones.calcular()" class="calc-igual">=</button>
                    <button onclick="modalTransacciones.limpiarCalculadora()" class="calc-clear">C</button>
                </div>
            </div>
            <button class="btn-primary" onclick="modalTransacciones.guardarTransferencia()">Registrar Transferencia</button>
        </div>
    </div>
</div>

<!-- BOTÓN FLOTANTE -->
<button class="fab-button" onclick="modalTransacciones.abrirModal()">➕</button>

<script src="js/gs-sync.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard-v2.js"></script>
<script src="js/presupuesto-v2.js"></script>
<script src="js/cuentas.js"></script>
<script src="js/transacciones-v2.js"></script>
<script src="js/modal-transacciones.js"></script>
<script src="js/categorias.js"></script>
</body>
</html>
